<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 280" role="img" aria-label="Stack tecnologica">
  <style>
    .box   { fill: #ffffff; stroke: #1351b4; stroke-width: 2; }
    .title { font-family: 'Segoe UI', Roboto, sans-serif; font-size: 18px; font-weight: 700; fill: #071d41; }
    .desc  { font-family: 'Segoe UI', Roboto, sans-serif; font-size: 13px; fill: #4b5563; }
    .layer { font-family: 'Segoe UI', Roboto, sans-serif; font-size: 12px; font-weight: 700; fill: #ffffff; letter-spacing: 2px; }
    .arr   { stroke: #1351b4; stroke-width: 2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1351b4"/>
    </marker>
  </defs>

  <rect width="1100" height="280" fill="#f3f6fc"/>

  <!-- Frontend -->
  <rect x="40" y="60" width="260" height="160" rx="10" class="box"/>
  <rect x="40" y="60" width="260" height="28" rx="10" fill="#dd2c74"/>
  <text x="170" y="79" text-anchor="middle" class="layer">FRONTEND</text>
  <text x="170" y="115" text-anchor="middle" class="title">Angular 18</text>
  <text x="170" y="140" text-anchor="middle" class="desc">Standalone components</text>
  <text x="170" y="160" text-anchor="middle" class="desc">Angular Material · NgRx</text>
  <text x="170" y="180" text-anchor="middle" class="desc">VLibras · WCAG 2.1</text>
  <text x="170" y="205" text-anchor="middle" class="desc" font-weight="700">Portal público + Admin</text>

  <!-- Backend -->
  <rect x="420" y="60" width="260" height="160" rx="10" class="box"/>
  <rect x="420" y="60" width="260" height="28" rx="10" fill="#1351b4"/>
  <text x="550" y="79" text-anchor="middle" class="layer">BACKEND</text>
  <text x="550" y="115" text-anchor="middle" class="title">Spring Boot 3.3</text>
  <text x="550" y="140" text-anchor="middle" class="desc">Java 21 · Maven</text>
  <text x="550" y="160" text-anchor="middle" class="desc">Spring Security + JWT</text>
  <text x="550" y="180" text-anchor="middle" class="desc">JPA · Flyway · OpenAPI</text>
  <text x="550" y="205" text-anchor="middle" class="desc" font-weight="700">46 módulos de domínio</text>

  <!-- DB -->
  <rect x="800" y="60" width="260" height="160" rx="10" class="box"/>
  <rect x="800" y="60" width="260" height="28" rx="10" fill="#198754"/>
  <text x="930" y="79" text-anchor="middle" class="layer">DADOS</text>
  <text x="930" y="115" text-anchor="middle" class="title">SQL Server 2022</text>
  <text x="930" y="140" text-anchor="middle" class="desc">88 tabelas modeladas</text>
  <text x="930" y="160" text-anchor="middle" class="desc">Redis (cache)</text>
  <text x="930" y="180" text-anchor="middle" class="desc">Flyway migrations</text>
  <text x="930" y="205" text-anchor="middle" class="desc" font-weight="700">Auditoria completa</text>

  <!-- arrows -->
  <line x1="305" y1="140" x2="415" y2="140" class="arr"/>
  <line x1="685" y1="140" x2="795" y2="140" class="arr"/>

  <text x="360" y="130" text-anchor="middle" class="desc">HTTPS / REST</text>
  <text x="740" y="130" text-anchor="middle" class="desc">JDBC</text>

  <!-- footer -->
  <text x="550" y="255" text-anchor="middle" class="desc">Docker · Docker Compose · Nginx · GitHub Actions · MailHog</text>
</svg>
