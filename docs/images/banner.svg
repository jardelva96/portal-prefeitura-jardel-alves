<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" role="img" aria-label="Portal Prefeitura Jardel Alves">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071d41"/>
      <stop offset="55%" stop-color="#0c326f"/>
      <stop offset="100%" stop-color="#1351b4"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffcd07"/>
      <stop offset="100%" stop-color="#ffe56a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="340" fill="url(#bg)"/>

  <!-- decorative shapes -->
  <circle cx="1080" cy="60" r="160" fill="#fff" opacity="0.04"/>
  <circle cx="1140" cy="290" r="100" fill="#fff" opacity="0.05"/>
  <circle cx="80" cy="310" r="180" fill="#fff" opacity="0.03"/>

  <!-- yellow accent bar -->
  <rect x="60" y="70" width="6" height="180" fill="url(#accent)" rx="3"/>

  <!-- title -->
  <text x="90" y="125" font-family="Segoe UI, Roboto, sans-serif" font-size="52" font-weight="700" fill="#ffffff">Portal Prefeitura</text>
  <text x="90" y="180" font-family="Segoe UI, Roboto, sans-serif" font-size="52" font-weight="300" fill="#ffffff" opacity="0.92">Jardel Alves</text>

  <!-- subtitle -->
  <text x="90" y="225" font-family="Segoe UI, Roboto, sans-serif" font-size="19" fill="#ffffff" opacity="0.82">Portal municipal completo · LAI · LGPD · WCAG 2.1 · eMAG</text>
  <text x="90" y="255" font-family="Segoe UI, Roboto, sans-serif" font-size="15" fill="#ffe56a" opacity="0.9" letter-spacing="1">SPRING BOOT 3  ·  ANGULAR 18  ·  SQL SERVER 2022  ·  DOCKER</text>

  <!-- pill tags -->
  <g font-family="Segoe UI, Roboto, sans-serif" font-size="13" fill="#ffffff">
    <rect x="90"  y="275" width="120" height="28" rx="14" fill="#ffffff" opacity="0.12"/>
    <text x="150" y="294" text-anchor="middle">Transparência</text>
    <rect x="220" y="275" width="70"  height="28" rx="14" fill="#ffffff" opacity="0.12"/>
    <text x="255" y="294" text-anchor="middle">e-SIC</text>
    <rect x="300" y="275" width="95"  height="28" rx="14" fill="#ffffff" opacity="0.12"/>
    <text x="347" y="294" text-anchor="middle">Ouvidoria</text>
    <rect x="405" y="275" width="90"  height="28" rx="14" fill="#ffffff" opacity="0.12"/>
    <text x="450" y="294" text-anchor="middle">Tributos</text>
    <rect x="505" y="275" width="95"  height="28" rx="14" fill="#ffffff" opacity="0.12"/>
    <text x="552" y="294" text-anchor="middle">Protocolo</text>
    <rect x="610" y="275" width="120" height="28" rx="14" fill="#ffffff" opacity="0.12"/>
    <text x="670" y="294" text-anchor="middle">Diário Oficial</text>
  </g>

  <!-- brasão estilizado PJA -->
  <g transform="translate(980, 170)">
    <circle cx="0" cy="0" r="95" fill="none" stroke="#ffcd07" stroke-width="2" opacity="0.7"/>
    <circle cx="0" cy="0" r="85" fill="#ffffff" opacity="0.06"/>
    <path d="M -52 -28 L 0 -62 L 52 -28 L 52 38 L 0 62 L -52 38 Z"
          fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.85"/>
    <path d="M -38 -20 L 0 -45 L 38 -20 L 38 28 L 0 45 L -38 28 Z"
          fill="#ffcd07" opacity="0.15"/>
    <text x="0" y="10" text-anchor="middle"
          font-family="Segoe UI, Roboto, sans-serif" font-size="34" font-weight="700" fill="#ffffff">PJA</text>
    <text x="0" y="80" text-anchor="middle"
          font-family="Segoe UI, Roboto, sans-serif" font-size="10" fill="#ffcd07" letter-spacing="2">MUNICÍPIO</text>
  </g>
</svg>
