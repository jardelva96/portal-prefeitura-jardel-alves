spring:
  application:
    name: portal-prefeitura-jardel-alves
  profiles:
    active: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 50MB
  messages:
    basename: i18n/messages
    encoding: UTF-8

server:
  port: 8080
  servlet:
    context-path: /api
  compression:
    enabled: true
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET:}
    expiration-ms: 3600000
    refresh-expiration-ms: 604800000
  cors:
    allowed-origins: http://localhost:4200
  storage:
    type: local
    local-path: ./uploads
  integration:
    govbr:
      base-url: https://sso.acesso.gov.br
    vlibras:
      enabled: true
    receitafederal:
      base-url: ''
    sefaz:
      base-url: ''
    pix:
      base-url: ''
    diariooficial:
      base-url: ''

logging:
  level:
    root: INFO
    br.gov.prefeiturajardelalves: DEBUG
